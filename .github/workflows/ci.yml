name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: motson
          POSTGRES_PASSWORD: motson
          POSTGRES_DB: motson_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U motson"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://motson:motson@localhost:5432/motson_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Vet
        run: go vet ./...
      - name: Test (contract suite runs against real Postgres)
        run: go test ./...
